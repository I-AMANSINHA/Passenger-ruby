#configuration file for Nginx to act as the "front door" and forward requests to Apache.

server {
    listen 80;
    server_name yourdomain.com;

    # OPTIONAL: Let Nginx serve static files (faster)
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|xml)$ {
        root /var/www/html;
        expires 30d;
    }

    # FORWARD everything else to Apache
    location / {
        proxy_pass http://127.0.0.1:8080;  # Point to Apache's new port
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

