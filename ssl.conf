# 1. Redirect all HTTP traffic (80) to HTTPS (443)
server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

# 2. Handle HTTPS traffic (443)
server {
    listen 443 ssl;
    server_name yourdomain.com;

    # Paths to your SSL files (often from Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/://yourdomain.com;
    ssl_certificate_key /etc/letsencrypt/live/://yourdomain.com;

    location / {
        proxy_pass http://127.0.0.1:8080;  # Apache listening internally
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

